<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro</title>
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100">

    <div class="flex min-h-screen items-center justify-center px-4 py-10">
        <div class="w-full max-w-2xl rounded-[2rem] border border-slate-700/70 bg-slate-900/90 p-8 shadow-2xl shadow-slate-950/50 backdrop-blur-xl">

            <div class="text-center">
                <p class="text-sm uppercase tracking-[0.35em] text-sky-400/80">Cronómetro</p>
                <h1 class="mt-3 text-4xl font-semibold tracking-tight text-slate-100 sm:text-5xl">Fique no ritmo</h1>
                <p class="mx-auto mt-4 max-w-2xl text-sm text-slate-400 sm:text-base">
                    Controle o tempo com precisão e estilo. Inicie, pause ou redefina o cronômetro facilmente.
                </p>
            </div>

            <div class="mt-10 rounded-[1.75rem] border border-slate-700/80 bg-slate-950/80 p-8 shadow-inner shadow-slate-950/40">
                <div class="flex flex-col items-center gap-4 rounded-3xl bg-slate-900/80 px-6 py-8 text-center shadow-lg shadow-slate-950/20 sm:flex-row sm:justify-between sm:gap-8">
                    <div class="font-mono text-slate-100">
                        <div class="text-6xl font-semibold tracking-tight sm:text-7xl" id="display_main">00:00:00</div>
                        <div class="mt-2 text-base text-slate-400 sm:text-lg" id="display_milliseconds">000 ms</div>
                    </div>
                    <div id="status" class="mt-2 rounded-full border border-sky-500/20 bg-sky-500/10 px-4 py-2 text-sm uppercase tracking-[0.2em] text-sky-300">
                        Pronto
                    </div>
                </div>
            </div>

            <div class="mt-10 flex flex-col gap-4 sm:flex-row sm:justify-center">
                <button id="reset" class="rounded-2xl bg-red-500 px-6 py-3 text-sm font-semibold uppercase tracking-wide text-white transition hover:bg-red-600 focus:outline-none focus:ring-4 focus:ring-red-500/30">
                    Reset
                </button>
                <button id="pause" class="rounded-2xl bg-slate-600 px-6 py-3 text-sm font-semibold uppercase tracking-wide text-white transition hover:bg-slate-500 focus:outline-none focus:ring-4 focus:ring-slate-500/30">
                    Pausar
                </button>
                <button id="start" class="rounded-2xl bg-emerald-500 px-6 py-3 text-sm font-semibold uppercase tracking-wide text-white transition hover:bg-emerald-400 focus:outline-none focus:ring-4 focus:ring-emerald-500/30">
                    Iniciar
                </button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>
